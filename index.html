<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Meeting Room Calendar</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    h1 {
      margin: 0;
      padding: 10px 15px;
      font-size: 18px;
      background: #111;
      color: #fff;
    }

    #calendar {
      padding: 10px;
      font-size: 14px;
    }

    .event {
      padding: 10px;
      margin-bottom: 8px;
      border-left: 4px solid #0078d4;
      background: #f5f5f5;
    }

    .time {
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Meeting Room Schedule (Today)</h1>
<div id="calendar">Loading events...</div>

<script>
const ICS_URL = "https://outlook.office365.com/owa/calendar/5ffdab88caa6494b83fdd5a68fd7ba2f@aahom.org/d412bbc8725840fe9ba70863c2c5943115149688986152418268/calendar.ics";

async function loadCalendar() {
  try {
    const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(ICS_URL);
    const res = await fetch(proxyUrl);
    const text = await res.text();

    const events = parseICS(text);
    render(events);
  } catch (e) {
    document.getElementById("calendar").innerHTML =
      "Failed to load calendar: " + e.message;
  }
}

// Minimal ICS parser (good enough for Outlook feeds)
function parseICS(data) {
  const lines = data.split(/\r?\n/);
  const events = [];
  let event = null;

  for (let line of lines) {
    if (line.startsWith("BEGIN:VEVENT")) {
      event = {};
    }

    if (event) {
      if (line.startsWith("SUMMARY:")) {
        event.title = line.replace("SUMMARY:", "");
      }
      if (line.startsWith("DTSTART")) {
        event.start = line.split(":")[1];
      }
      if (line.startsWith("DTEND")) {
        event.end = line.split(":")[1];
      }
    }

    if (line.startsWith("END:VEVENT")) {
      if (event) events.push(event);
      event = null;
    }
  }

  return events;
}

function render(events) {
  const container = document.getElementById("calendar");

  if (!events.length) {
    container.innerHTML = "No events found for today.";
    return;
  }

  container.innerHTML = "";

  events.slice(0, 20).forEach(e => {
    const div = document.createElement("div");
    div.className = "event";

    div.innerHTML = `
      <div class="time">${e.start || ""} - ${e.end || ""}</div>
      <div>${e.title || "Untitled event"}</div>
    `;

    container.appendChild(div);
  });
}

loadCalendar();

// refresh every 5 minutes
setInterval(loadCalendar, 300000);
</script>

</body>
</html>
