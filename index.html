<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AAHOM Calendar</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.11/index.global.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.11/index.global.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --ink:      #1a1a2e;
      --paper:    #f8f5f0;
      --accent:   #c0392b;
      --accent2:  #e67e22;
      --muted:    #7f8c8d;
      --border:   #ddd8d0;
      --card:     #ffffff;
      --today-bg: #fff8f0;
      --shadow:   0 2px 16px rgba(0,0,0,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 40px;
    }

    .header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding: 36px 0 28px;
      border-bottom: 2px solid var(--ink);
      margin-bottom: 32px;
    }

    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .header .pill {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .header .sync-status {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
      white-space: nowrap;
    }

    #calendar-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: var(--shadow);
      padding: 24px;
      overflow: hidden;
    }

    .fc { font-family: 'DM Sans', sans-serif; }
    .fc .fc-toolbar { margin-bottom: 20px; gap: 12px; }
    .fc .fc-toolbar-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      letter-spacing: -0.01em;
    }

    .fc .fc-button {
      background: var(--ink) !important;
      border: none !important;
      border-radius: 3px !important;
      font-family: 'DM Sans', sans-serif !important;
      font-size: 12px !important;
      font-weight: 500 !important;
      letter-spacing: 0.05em !important;
      padding: 7px 14px !important;
      transition: opacity 0.15s !important;
    }
    .fc .fc-button:hover { opacity: 0.75 !important; }
    .fc .fc-button-active { background: var(--accent) !important; }
    .fc .fc-button:focus { box-shadow: none !important; }

    .fc .fc-today-button {
      background: transparent !important;
      border: 1.5px solid var(--ink) !important;
      color: var(--ink) !important;
    }
    .fc .fc-today-button:hover { background: var(--ink) !important; color: #fff !important; }

    .fc .fc-timegrid-slot { height: 44px !important; border-color: var(--border) !important; }
    .fc .fc-timegrid-slot-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .fc .fc-day-today { background: var(--today-bg) !important; }

    .fc .fc-col-header-cell {
      border-bottom: 2px solid var(--border) !important;
      padding: 10px 0 !important;
    }
    .fc .fc-col-header-cell-cushion {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: var(--ink);
      text-decoration: none !important;
    }

    .fc-event {
      border: none !important;
      border-radius: 3px !important;
      font-size: 12px !important;
      font-weight: 500 !important;
      padding: 3px 7px !important;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12) !important;
    }
    .fc-event .fc-event-title { font-weight: 600; }
    .fc-event .fc-event-time { font-weight: 300; opacity: 0.85; }
    .fc .fc-daygrid-event { border-radius: 3px !important; }

    .fc-scroller::-webkit-scrollbar { width: 6px; }
    .fc-scroller::-webkit-scrollbar-track { background: transparent; }
    .fc-scroller::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    #status {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
      padding: 12px 0 4px;
    }
    #status.visible { display: flex; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status.error { color: var(--accent); }
    #status.error .spinner { display: none; }

    .tooltip {
      position: fixed;
      z-index: 9999;
      background: var(--ink);
      color: #fff;
      border-radius: 5px;
      padding: 10px 14px;
      max-width: 280px;
      font-size: 12.5px;
      line-height: 1.5;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.15s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    .tooltip.show { opacity: 1; transform: translateY(0); }
    .tooltip strong { font-family: 'DM Serif Display', serif; font-size: 14px; display: block; margin-bottom: 4px; }
    .tooltip .tip-time { color: var(--accent2); font-weight: 500; margin-bottom: 4px; }
    .tooltip .tip-loc { color: #ccc; }
  </style>
</head>
<body>

<div class="app">
  <header class="header">
    <h1>AAHOM Events</h1>
    <span class="pill">Live Calendar</span>
    <span class="sync-status" id="sync-status"></span>
  </header>
  <div>
    <div id="status" class="visible">
      <span class="spinner"></span>
      <span id="status-text">Fetching calendar events…</span>
    </div>
    <div id="calendar-wrap">
      <div id="calendar"></div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <strong id="tip-title"></strong>
  <div class="tip-time" id="tip-time"></div>
  <div class="tip-loc" id="tip-loc"></div>
</div>

<script>
const ICS_URL = 'https://outlook.office365.com/owa/calendar/5ffdab88caa6494b83fdd5a68fd7ba2f@aahom.org/bce60bc8ad5945939494295b8daa01148196703426695370791/calendar.ics';
const REFRESH_INTERVAL_MS = 5 * 60 * 1000; // 5 minutes

// How far ahead/behind to expand recurring events (in days)
const EXPAND_PAST_DAYS   = 90;
const EXPAND_FUTURE_DAYS = 365;

const PROXIES = [
  {
    url: u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    extract: async r => { const j = await r.json(); if (!j.contents) throw new Error('empty'); return j.contents; }
  },
  {
    url: u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    extract: async r => r.text()
  },
  {
    url: u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
    extract: async r => r.text()
  },
  {
    url: u => `https://thingproxy.freeboard.io/fetch/${u}`,
    extract: async r => r.text()
  }
];

const PALETTE = ['#c0392b','#d35400','#8e44ad','#16a085','#2980b9','#27ae60'];
const colorFor = str => PALETTE[Math.abs([...str].reduce((h,c)=>h*31+c.charCodeAt(0)|0,0)) % PALETTE.length];

// Tooltip
const tooltip  = document.getElementById('tooltip');
const tipTitle = document.getElementById('tip-title');
const tipTime  = document.getElementById('tip-time');
const tipLoc   = document.getElementById('tip-loc');

function showTip(info) {
  const { event, jsEvent } = info;
  tipTitle.textContent = event.title;
  const fmt = d => d ? d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
  tipTime.textContent = event.allDay ? 'All day' : `${fmt(event.start)} – ${fmt(event.end)}`;
  const loc = event.extendedProps.location || '';
  tipLoc.textContent = loc;
  tipLoc.style.display = loc ? 'block' : 'none';
  positionTip(jsEvent);
  tooltip.classList.add('show');
}
function positionTip(e) {
  const pad = 14, TW = 280;
  let x = e.clientX + pad, y = e.clientY + pad;
  if (x + TW > window.innerWidth) x = e.clientX - TW - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}
document.addEventListener('mousemove', e => { if (tooltip.classList.contains('show')) positionTip(e); });
function hideTip() { tooltip.classList.remove('show'); }

// ── ICS parsing with full recurrence expansion ────────────────────────────────
function parseICS(raw) {
  const comp    = new ICAL.Component(ICAL.parse(raw));
  const vevents = comp.getAllSubcomponents('vevent');

  // Expansion window
  const now        = new Date();
  const windowStart = new Date(now); windowStart.setDate(windowStart.getDate() - EXPAND_PAST_DAYS);
  const windowEnd   = new Date(now); windowEnd.setDate(windowEnd.getDate() + EXPAND_FUTURE_DAYS);
  const icalStart   = ICAL.Time.fromJSDate(windowStart, false);
  const icalEnd     = ICAL.Time.fromJSDate(windowEnd,   false);

  // Build a map of exception/override events keyed by UID
  // These are VEVENT entries that have a RECURRENCE-ID (they override one occurrence)
  const overrides = {}; // uid -> Map<recurrence-id-string, ICAL.Event>
  vevents.forEach(ve => {
    if (ve.getFirstPropertyValue('recurrence-id')) {
      const ev  = new ICAL.Event(ve);
      const uid = ev.uid;
      if (!overrides[uid]) overrides[uid] = new Map();
      overrides[uid].set(ev.recurrenceId.toString(), ev);
    }
  });

  const events = [];

  vevents.forEach(ve => {
    // Skip override entries — handled via the iterator below
    if (ve.getFirstPropertyValue('recurrence-id')) return;

    try {
      const ev = new ICAL.Event(ve, { exceptions: Object.values(overrides[ev?.uid] || {}) });

      if (ev.isRecurring()) {
        // Expand recurrences within the window
        const iter = ev.iterator();
        let next;
        let safetyLimit = 1000; // guard against infinite loops
        while ((next = iter.next()) && safetyLimit-- > 0) {
          if (next.compare(icalEnd) > 0) break;   // past window end
          if (next.compare(icalStart) < 0) continue; // before window start

          const details = ev.getOccurrenceDetails(next);

          // Check if this occurrence is overridden by an exception
          const overrideKey = next.toString();
          const override = overrides[ev.uid]?.get(overrideKey);
          const src = override || details;

          const start  = (override ? override.startDate  : details.startDate).toJSDate();
          const end    = (override ? override.endDate    : details.endDate  )?.toJSDate();
          const title  = (override ? override.summary    : ev.summary) || '(No title)';
          const loc    = (override ? override.location   : ev.location) || '';
          const desc   = (override ? override.description: ev.description) || '';

          events.push({
            id:     `${ev.uid}_${next.toString()}`,
            title,
            start,
            end,
            allDay: details.startDate.isDate,
            color:  colorFor(title),
            extendedProps: { location: loc, description: desc }
          });
        }
      } else {
        // Non-recurring event — add directly
        const dtstart = ev.startDate;
        const dtend   = ev.endDate;
        if (!dtstart) return;

        // Still filter to window so we don't show ancient one-off events
        const jsStart = dtstart.toJSDate();
        if (jsStart < windowStart || jsStart > windowEnd) return;

        events.push({
          id:     ev.uid || Math.random().toString(36).slice(2),
          title:  ev.summary || '(No title)',
          start:  jsStart,
          end:    dtend ? dtend.toJSDate() : null,
          allDay: dtstart.isDate,
          color:  colorFor(ev.summary || ''),
          extendedProps: {
            location:    ev.location    || '',
            description: ev.description || '',
          }
        });
      }
    } catch (err) {
      console.warn('Skipping event:', err.message);
    }
  });

  return events;
}

// Status helpers
const statusEl   = document.getElementById('status');
const statusText = document.getElementById('status-text');
const syncStatus = document.getElementById('sync-status');

function setStatus(msg, isError = false) {
  statusEl.classList.toggle('error', isError);
  statusText.textContent = msg;
  statusEl.classList.add('visible');
}
function clearStatus() { statusEl.classList.remove('visible'); }

// Fetch via proxy chain
async function fetchICS() {
  for (let i = 0; i < PROXIES.length; i++) {
    try {
      const res  = await fetch(PROXIES[i].url(ICS_URL), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await PROXIES[i].extract(res);
      if (!text || !text.includes('BEGIN:VCALENDAR')) throw new Error('Invalid ICS');
      return text;
    } catch (err) {
      console.warn(`Proxy ${i + 1} failed:`, err.message);
    }
  }
  throw new Error('All proxies failed — the calendar feed may be temporarily unavailable.');
}

// Main
document.addEventListener('DOMContentLoaded', async () => {
  const cal = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'timeGridDay',
    headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
    height: 'auto',
    nowIndicator: true,
    scrollTime: '08:00:00',
    slotMinTime: '06:00:00',
    slotMaxTime: '23:00:00',
    events: [],
    eventMouseEnter: showTip,
    eventMouseLeave: hideTip,
    eventClick(info) { info.jsEvent.stopPropagation(); },
    eventDidMount(info) { info.el.title = info.event.extendedProps.location || ''; }
  });
  cal.render();

  async function loadEvents(isRefresh = false) {
    if (!isRefresh) setStatus('Fetching calendar events…');
    try {
      const text   = await fetchICS();
      const events = parseICS(text);
      cal.getEvents().forEach(e => e.remove());
      events.forEach(e => cal.addEvent(e));
      const now = new Date();
      syncStatus.textContent = `${events.length} events · synced ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
      clearStatus();
    } catch (err) {
      console.error(err);
      if (!isRefresh) {
        setStatus(err.message, true);
      } else {
        syncStatus.textContent = `⚠ refresh failed · ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
      }
    }
  }

  await loadEvents(false);
  setInterval(() => loadEvents(true), REFRESH_INTERVAL_MS);
});
</script>
</body>
</html>
